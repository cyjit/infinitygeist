<!DOCTYPE html>
<html lang="en">
<!--
    PROJECT: ITS Season 17 Quick Reference
    DESCRIPTION: A lightweight, single-file webapp for the Infinity Tournament System Season 17 rules.
    Optimized for at-the-table quick reference on mobile, with full rules browsing on desktop.
    Design language matches infinitythelinks.com.
    Corvus Sphere is ass.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Geist — ITS 17</title>
    <meta name="description" content="Quick reference for Infinity the Game ITS Season 17: Seekers. Missions, rules, and deployment maps.">
    <link rel="icon" type="image/png" href="geist.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CSS Variables & Reset
   ═══════════════════════════════════════════ */
:root {
    --bg: #0c101d;
    --bg-card: #141925;
    --bg-card-hover: #1a2030;
    --bg-surface: #1f2937;
    --border: #2a3348;
    --border-light: #374151;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --text-muted: #6b7281;
    --white: #ffffff;
    --cyan: #22d3ee;
    --cyan-light: #67e8f9;
    --cyan-glow: rgba(34,211,238,0.4);
    --cyan-bg: rgba(34,211,238,0.08);
    --orange: #f59e0b;
    --orange-dim: rgba(245,158,11,0.15);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --radius: 6px;
    --radius-lg: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--bg);
    background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 25px 25px;
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 80px;
}

/* ═══════════════════════════════════════════
   Layout
   ═══════════════════════════════════════════ */
.app { max-width: 960px; margin: 0 auto; padding: 12px; }
@media(min-width:768px) { .app { padding: 24px; } }

/* ═══════════════════════════════════════════
   Header / Nav
   ═══════════════════════════════════════════ */
.site-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
}
.site-header .header-logo {
    width: 64px;
    height: 64px;
    object-fit: contain;
    flex-shrink: 0;
}
.site-header .header-text {
    text-align: left;
}
.site-header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 0.05em;
    text-transform: uppercase;
}
.site-header h1 span { color: var(--cyan); }
.site-header .subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
}
.site-header .version-info {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
    opacity: 0.7;
}
.site-header .version-link {
    color: inherit;
    text-decoration: underline;
    text-decoration-style: dotted;
    transition: color 0.2s;
}
.site-header .version-link:hover {
    color: #7dd3fc;
}
.site-header .feedback-link {
    display: inline-block;
    font-size: 0.55rem;
    color: inherit;
    text-decoration: underline;
    text-decoration-style: dotted;
    margin-top: 3px;
    letter-spacing: 0.05em;
    transition: color 0.2s;
}
.site-header .feedback-link:hover {
    color: #7dd3fc;
}

.nav-bar {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
}
.nav-bar::-webkit-scrollbar { display: none; }

.nav-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.nav-btn:hover { background: var(--bg-card-hover); color: var(--text); }
.nav-btn.active {
    background: var(--cyan-bg);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 8px var(--cyan-glow);
}

/* ═══════════════════════════════════════════
   Mission Grid (Landing)
   ═══════════════════════════════════════════ */
.mission-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
}
@media(min-width:520px) { .mission-grid { grid-template-columns: 1fr 1fr; } }
@media(min-width:768px) { .mission-grid { grid-template-columns: 1fr 1fr 1fr; } }

.mission-tile {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
}
.mission-tile:hover {
    background: var(--bg-card-hover);
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(34,211,238,0.15);
    transform: translateY(-1px);
}
.mission-tile .tile-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
}
.mission-tile .tile-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}
.tag {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.tag-ts { background: var(--cyan-bg); color: var(--cyan); }
.tag-reinf-yes { background: var(--green-dim); color: var(--green); }
.tag-reinf-no { background: var(--red-dim); color: var(--red); }
.tag-da { background: var(--orange-dim); color: var(--orange); }
.tag-resops { background: rgba(168,85,247,0.12); color: #c084fc; }
.tag-hvt { background: rgba(244,114,182,0.12); color: #f472b6; }
.tag-class { background: rgba(168,162,255,0.12); color: #a5b4fc; }
.tag-retreat-yes { background: var(--orange-dim); color: var(--orange); }
.tag-retreat-no { background: var(--green-dim); color: var(--green); }

.section-divider {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 12px 0 6px;
    grid-column: 1 / -1;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.rand-btn {
    font-family: 'Exo 2', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: rgba(34,211,238,0.1);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    text-transform: uppercase;
}
.rand-btn:hover { background: rgba(34,211,238,0.25); }
.section-divider .divider-note {
    font-weight: 500;
    font-size: 0.65rem;
    color: var(--text-muted);
    opacity: 0.7;
    letter-spacing: 0.08em;
    margin-left: 6px;
}

/* ═══════════════════════════════════════════
   Mission Detail View
   ═══════════════════════════════════════════ */
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--cyan);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.back-btn:hover { color: var(--cyan-light); text-shadow: 0 0 6px var(--cyan-glow); }

.mission-header {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 12px;
}
.mission-header h2 {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.mission-header .mission-meta {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    flex-wrap: wrap;
}
.mission-header .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
}
.mission-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 8px;
    overflow: hidden;
}
.mission-section-head {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
    transition: background 0.15s;
}
.mission-section-head:hover { background: var(--bg-card-hover); }
.mission-section-head h3 {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.mission-section-head .chevron {
    color: var(--text-muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
}
.mission-section.open .chevron { transform: rotate(180deg); }
.mission-section-body {
    display: none;
    padding: 0 16px 16px;
}
.mission-section.open .mission-section-body { display: block; }

/* Objectives list */
.obj-list { list-style: none; }
.obj-list li {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    display: flex;
    justify-content: space-between;
    gap: 12px;
}
.obj-list li:last-child { border-bottom: none; }
.obj-pts {
    font-weight: 700;
    color: var(--orange);
    white-space: nowrap;
    flex-shrink: 0;
}

/* Deployment table */
.dep-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    margin-top: 8px;
}
.dep-table th {
    background: var(--bg-surface);
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.68rem;
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
}
.dep-table td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
}
.dep-table tr:last-child td { border-bottom: none; }

/* Skills */
.skill-block {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin: 8px 0;
}
.skill-block .skill-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--white);
    text-transform: uppercase;
    margin-bottom: 2px;
}
.skill-block .skill-type {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.skill-block .skill-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 8px;
    margin-bottom: 3px;
}
.skill-block ul {
    list-style: none;
    padding: 0;
}
.skill-block li {
    font-size: 0.82rem;
    padding: 2px 0;
    padding-left: 14px;
    position: relative;
    color: var(--text);
}
.skill-block li::before {
    content: '►';
    position: absolute;
    left: 0;
    color: var(--text-muted);
    font-size: 0.6rem;
    top: 5px;
}

/* Shared rule inline expander */
.shared-rule-ref {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--cyan);
    cursor: pointer;
    padding: 4px 8px;
    background: var(--cyan-bg);
    border-radius: var(--radius);
    margin: 4px 2px;
    border: 1px solid transparent;
    transition: all 0.15s;
}
.shared-rule-ref:hover { border-color: var(--cyan); }
.shared-rule-ref .sr-chevron { font-size: 0.6rem; transition: transform 0.2s; }
.shared-rule-ref.open .sr-chevron { transform: rotate(90deg); }

.shared-rule-inline {
    display: none;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--cyan);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin: 6px 0;
    font-size: 0.82rem;
}
.shared-rule-inline.open { display: block; }
.shared-rule-inline p { margin: 4px 0; color: var(--text); }
.shared-rule-inline ul { list-style: none; padding: 0; }
.shared-rule-inline li { padding: 2px 0 2px 14px; position: relative; }
.shared-rule-inline li::before { content: '▸'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.7rem; }
.shared-rule-inline .sr-title {
    font-weight: 700; color: var(--white); text-transform: uppercase;
    font-size: 0.78rem; letter-spacing: 0.05em; margin-bottom: 4px;
}

/* SVG maps */
.map-container {
    margin: 8px 0;
    overflow-x: auto;
}
.map-container svg {
    width: 100%;
    max-width: 500px;
    height: auto;
    display: block;
    margin: 0 auto;
}

/* Tactical Support d12 */
.ts-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 2px 10px;
    font-size: 0.8rem;
    margin: 6px 0;
}
.ts-grid .ts-num {
    color: var(--orange);
    font-weight: 700;
    font-size: 0.75rem;
    text-align: right;
    min-width: 20px;
}
.ts-grid .ts-effect { color: var(--text); }
.ts-note {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 6px;
    font-style: italic;
}

/* Profile table (turrets, prototypes, etc) */
.profile-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
    margin: 8px 0;
}
.profile-table th {
    background: var(--bg);
    color: var(--text-dim);
    font-weight: 600;
    padding: 4px 6px;
    text-align: center;
    font-size: 0.65rem;
    text-transform: uppercase;
    border-bottom: 2px solid var(--cyan);
}
.profile-table td {
    padding: 4px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    color: var(--text);
}

/* Panoply chart */
.panoply-grid {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    gap: 2px 12px;
    font-size: 0.78rem;
    margin: 6px 0;
}
.panoply-grid .pg-num { color: var(--text-muted); font-weight: 600; }

/* Important callout */
.callout {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: var(--radius);
    padding: 8px 12px;
    margin: 8px 0;
    font-size: 0.82rem;
}
.callout-label {
    font-size: 0.7rem; font-weight: 700; color: var(--orange);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px;
}

/* Notes / flavor text */
.flavor { color: var(--text-muted); font-style: italic; font-size: 0.82rem; margin-bottom: 8px; }

/* ═══════════════════════════════════════════
   Rules Browse View
   ═══════════════════════════════════════════ */
.rules-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 8px;
    overflow: hidden;
}
.rules-section-head {
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.rules-section-head:hover { background: var(--bg-card-hover); }
.rules-section-head h2 {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.rules-section-body {
    display: none;
    padding: 0 16px 16px;
    font-size: 0.85rem;
}
.rules-section.open .rules-section-body { display: block; }
.rules-section.open .chevron { transform: rotate(180deg); }

.rules-section-body h3 {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 12px;
    margin-bottom: 4px;
    padding-bottom: 3px;
    border-bottom: 1px solid var(--border);
}
.rules-section-body h3:first-child { margin-top: 0; }
.rules-section-body p { margin: 5px 0; color: var(--text); }
.rules-section-body ul { padding-left: 0; list-style: none; }
.rules-section-body li { padding: 2px 0 2px 14px; position: relative; }
.rules-section-body li::before { content: '▸'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.7rem; }

.rules-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    margin: 8px 0;
}
.rules-table th {
    background: var(--bg-surface);
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.68rem;
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
}
.rules-table td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
}
.threshold-table { text-align: center; }
.threshold-table th { text-align: center; font-size: 0.65rem; }
.threshold-table td { text-align: center; font-size: 0.75rem; }
.threshold-table .op-val { color: var(--orange); font-weight: 700; }

/* ═══════════════════════════════════════════
   Utility
   ═══════════════════════════════════════════ */
.hidden { display: none !important; }
.text-note { font-size: 0.78rem; color: var(--text-muted); margin: 6px 0; }

/* Back to top */
#toTopBtn {
    display: none; position: fixed; bottom: 16px; right: 16px; z-index: 99;
    border: 1px solid var(--cyan); background: var(--bg-card);
    color: var(--cyan); cursor: pointer; padding: 10px 12px;
    border-radius: var(--radius); font-size: 16px; font-family: inherit;
    transition: all 0.2s;
}
#toTopBtn:hover { background: var(--cyan-bg); box-shadow: 0 0 10px var(--cyan-glow); }

/* ═══════════════════════════════════════════
   Dice Roller Widget
   ═══════════════════════════════════════════ */
#diceToggle {
    position: fixed; bottom: 16px; left: 16px; z-index: 200;
    width: 46px; height: 46px; border: 1px solid var(--cyan);
    background: var(--bg-card); color: var(--cyan); cursor: pointer;
    border-radius: var(--radius); font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 0 8px var(--cyan-glow);
}
#diceToggle:hover { background: var(--cyan-bg); box-shadow: 0 0 14px var(--cyan-glow); }
#diceToggle svg { width: 26px; height: 26px; fill: var(--cyan); }

#dicePanel {
    display: none; position: fixed; bottom: 72px; left: 16px; z-index: 200;
    width: 300px; max-height: 70vh;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    flex-direction: column; overflow: hidden;
}
#dicePanel.open { display: flex; }

.dice-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.dice-header h3 {
    font-size: 0.8rem; color: var(--cyan); text-transform: uppercase;
    letter-spacing: 0.1em; font-weight: 700; margin: 0;
}
.dice-close {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 1.1rem; padding: 0 4px; line-height: 1;
}
.dice-close:hover { color: var(--text); }

.dice-buttons {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    padding: 10px 12px;
}
.dice-roll-btn {
    background: var(--bg-surface); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; padding: 10px 6px;
    border-radius: var(--radius); font-family: inherit;
    font-size: 0.72rem; font-weight: 600; text-align: center;
    transition: all 0.15s; line-height: 1.3;
}
.dice-roll-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-bg); }
.dice-roll-btn:active { transform: scale(0.96); }
.dice-roll-btn .dice-label { display: block; font-size: 0.65rem; color: var(--text-muted); font-weight: 400; margin-top: 2px; }

.dice-log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; border-top: 1px solid var(--border);
}
.dice-log-header span {
    font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.08em; font-weight: 600;
}
.dice-clear-btn {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em;
    font-family: inherit;
}

// SVG Map Generator
// ═══════════════════════════════════════════

function generateMap(mission) {
    if (!mission.mapData) return '';
    const md = mission.mapData;
    // Square map with margin for dimension labels
    const margin = 36; // space for labels
    const S = 400; // inner table size (square)
    const W = S + margin * 2;
    const H = S + margin * 2;

    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:'Exo 2',sans-serif">`;

    // Table background (square)
    svg += `<rect x="${margin}" y="${margin}" width="${S}" height="${S}" fill="#141925" stroke="#2a3348" stroke-width="1.5" rx="4"/>`;

    const tx = margin, ty = margin;

    // Helper: dimension label with arrows
    function dimLabel(x1, y1, x2, y2, label, side) {
        const midX = (x1+x2)/2, midY = (y1+y2)/2;
        let textAttr = '';
        if (side === 'left') {
            textAttr = `x="${midX-6}" y="${midY}" text-anchor="end" dominant-baseline="middle" transform="rotate(-90 ${midX-6} ${midY})"`;
        } else if (side === 'right') {
            textAttr = `x="${midX+6}" y="${midY}" text-anchor="start" dominant-baseline="middle" transform="rotate(90 ${midX+6} ${midY})"`;
        } else if (side === 'top') {
            textAttr = `x="${midX}" y="${midY-5}" text-anchor="middle"`;
        } else if (side === 'bottom') {
            textAttr = `x="${midX}" y="${midY+12}" text-anchor="middle"`;
        } else if (side === 'inner-left') {
            textAttr = `x="${x1+3}" y="${midY}" text-anchor="start" dominant-baseline="middle" transform="rotate(-90 ${x1+3} ${midY})"`;
        } else if (side === 'inner-right') {
            textAttr = `x="${x2-3}" y="${midY}" text-anchor="end" dominant-baseline="middle" transform="rotate(-90 ${x2-3} ${midY})"`;
        }
        return `<text ${textAttr} fill="#6b7281" font-size="9" font-weight="600">${label}</text>`;
    }

    // Table edge dimensions (always show 48" for 300+ standard reference)
    svg += dimLabel(tx, ty + S + 4, tx + S, ty + S + 4, '48"', 'bottom');
    svg += dimLabel(tx - 4, ty, tx - 4, ty + S, '48"', 'left');

    // Deployment zones
    if (md.type === 'standard' || md.type === 'wide') {
        const dzRatio = md.type === 'wide' ? 1/3 : 0.25;
        const dzH = S * dzRatio;
        const dzLabel = md.type === 'wide' ? '16"' : '12"';

        // Zone A (top)
        const dzLabelA = md.dzLabelA || 'DEPLOYMENT ZONE A';
        const dzLabelB = md.dzLabelB || 'DEPLOYMENT ZONE B';
        svg += `<rect x="${tx}" y="${ty}" width="${S}" height="${dzH}" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4 2" rx="2"/>`;
        svg += `<text x="${tx+8}" y="${ty+16}" fill="rgba(34,211,238,0.5)" font-size="10" font-weight="600">${dzLabelA}</text>`;
        // Zone B (bottom)
        svg += `<rect x="${tx}" y="${ty+S-dzH}" width="${S}" height="${dzH}" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="4 2" rx="2"/>`;
        svg += `<text x="${tx+8}" y="${ty+S-dzH+16}" fill="rgba(245,158,11,0.5)" font-size="10" font-weight="600">${dzLabelB}</text>`;

        // DZ depth dimension (right side)
        svg += dimLabel(tx + S + 4, ty, tx + S + 4, ty + dzH, dzLabel, 'right');
        svg += dimLabel(tx + S + 4, ty + S - dzH, tx + S + 4, ty + S, dzLabel, 'right');

    } else if (md.type === 'corner') {
        const r = S * 0.5; // radius for 300+ (24")
        const dzCorner = md.dzCorner || 'tr-bl'; // 'tr-bl' (default) or 'tl-br'
        if (dzCorner === 'tl-br') {
            // DZ A = top-left corner
            svg += `<path d="M ${tx} ${ty} L ${tx+r} ${ty} A ${r} ${r} 0 0 1 ${tx} ${ty+r} Z" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4 2"/>`;
            svg += `<text x="${tx+8}" y="${ty+16}" fill="rgba(34,211,238,0.5)" font-size="10" font-weight="600">DZ A</text>`;
            // DZ B = bottom-right corner
            svg += `<path d="M ${tx+S} ${ty+S} L ${tx+S-r} ${ty+S} A ${r} ${r} 0 0 1 ${tx+S} ${ty+S-r} Z" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="4 2"/>`;
            svg += `<text x="${tx+S-8}" y="${ty+S-8}" fill="rgba(245,158,11,0.5)" font-size="10" font-weight="600" text-anchor="end">DZ B</text>`;
            // Radius label
            svg += `<line x1="${tx}" y1="${ty}" x2="${tx+r*0.7}" y2="${ty+r*0.7}" stroke="#6b7281" stroke-width="0.7" stroke-dasharray="3 2"/>`;
            svg += `<text x="${tx+r*0.35+4}" y="${ty+r*0.35-4}" fill="#6b7281" font-size="8" font-weight="600">24"</text>`;
        } else {
            // DZ A = top-right corner
            svg += `<path d="M ${tx+S} ${ty} L ${tx+S} ${ty+r} A ${r} ${r} 0 0 1 ${tx+S-r} ${ty} Z" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4 2"/>`;
            svg += `<text x="${tx+S-8}" y="${ty+16}" fill="rgba(34,211,238,0.5)" font-size="10" font-weight="600" text-anchor="end">DZ A</text>`;
            // DZ B = bottom-left corner
            svg += `<path d="M ${tx} ${ty+S} L ${tx} ${ty+S-r} A ${r} ${r} 0 0 1 ${tx+r} ${ty+S} Z" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="4 2"/>`;
            svg += `<text x="${tx+8}" y="${ty+S-8}" fill="rgba(245,158,11,0.5)" font-size="10" font-weight="600">DZ B</text>`;
            // Radius label (along top-right arc)
            svg += `<line x1="${tx+S}" y1="${ty}" x2="${tx+S-r*0.7}" y2="${ty+r*0.7}" stroke="#6b7281" stroke-width="0.7" stroke-dasharray="3 2"/>`;
            svg += `<text x="${tx+S-r*0.35-4}" y="${ty+r*0.35-4}" fill="#6b7281" font-size="8" font-weight="600">24"</text>`;
        }

    } else if (md.type === 'crossing') {
        const dzH = S * 0.25;
        const stripH = S * 0.083;
        // A rear (top)
        svg += `<rect x="${tx}" y="${ty}" width="${S}" height="${dzH}" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.3)" stroke-width="1" stroke-dasharray="4 2" rx="2"/>`;
        svg += `<text x="${tx+8}" y="${ty+14}" fill="rgba(34,211,238,0.5)" font-size="9" font-weight="600">DZ A (REAR)</text>`;
        // A strip (in B's half, touching center line — extends downward from center)
        svg += `<rect x="${tx}" y="${ty+S/2}" width="${S}" height="${stripH}" fill="rgba(34,211,238,0.04)" stroke="rgba(34,211,238,0.2)" stroke-width="1" stroke-dasharray="3 2" rx="2"/>`;
        svg += `<text x="${tx+S-75}" y="${ty+S/2+11}" fill="rgba(34,211,238,0.4)" font-size="7.5" font-weight="600">DZ A (STRIP)</text>`;
        // B rear (bottom)
        svg += `<rect x="${tx}" y="${ty+S-dzH}" width="${S}" height="${dzH}" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.3)" stroke-width="1" stroke-dasharray="4 2" rx="2"/>`;
        svg += `<text x="${tx+8}" y="${ty+S-dzH+14}" fill="rgba(245,158,11,0.5)" font-size="9" font-weight="600">DZ B (REAR)</text>`;
        // B strip (in A's half, touching center line — extends upward from center)
        svg += `<rect x="${tx}" y="${ty+S/2-stripH}" width="${S}" height="${stripH}" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.2)" stroke-width="1" stroke-dasharray="3 2" rx="2"/>`;
        svg += `<text x="${tx+8}" y="${ty+S/2-stripH+11}" fill="rgba(245,158,11,0.4)" font-size="7.5" font-weight="600">DZ B (STRIP)</text>`;

        // Dead zone labels
        svg += `<text x="${tx+S/2}" y="${ty+dzH+(S/2-stripH-dzH)/2+4}" fill="rgba(239,68,68,0.3)" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.1em">DEAD ZONE</text>`;
        svg += `<text x="${tx+S/2}" y="${ty+S/2+stripH+(S-dzH-(S/2+stripH))/2+4}" fill="rgba(239,68,68,0.3)" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="0.1em">DEAD ZONE</text>`;

        svg += dimLabel(tx + S + 4, ty, tx + S + 4, ty + dzH, '12"', 'right');
        svg += dimLabel(tx + S + 4, ty + S - dzH, tx + S + 4, ty + S, '12"', 'right');
    }

    // Center line
    if (md.type !== 'corner') {
        svg += `<line x1="${tx}" y1="${ty+S/2}" x2="${tx+S}" y2="${ty+S/2}" stroke="#374151" stroke-width="1" stroke-dasharray="6 3"/>`;
    } else {
        const diagDir = md.diag || 'tr-bl'; // 'tr-bl' (default) or 'tl-br'
        if (diagDir === 'tl-br') {
            svg += `<line x1="${tx}" y1="${ty}" x2="${tx+S}" y2="${ty+S}" stroke="#374151" stroke-width="0.7" stroke-dasharray="6 3"/>`;
        } else {
            svg += `<line x1="${tx+S}" y1="${ty}" x2="${tx}" y2="${ty+S}" stroke="#374151" stroke-width="0.7" stroke-dasharray="6 3"/>`;
        }
    }

    // Exclusion zone
    if (md.exclusionZone) {
        const ezH = S * 0.167; // ~8" on 48" table
        const label = md.exclusionZone === 'attacker' ? 'EXCLUSION ZONE (ATTACKER)' : 'EXCLUSION ZONE';
        svg += `<rect x="${tx}" y="${ty+S/2-ezH/2}" width="${S}" height="${ezH}" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.2)" stroke-width="1" stroke-dasharray="3 2" rx="2"/>`;
        svg += `<text x="${tx+S/2}" y="${ty+S/2-ezH/2+11}" fill="rgba(239,68,68,0.35)" font-size="7.5" font-weight="600" text-anchor="middle">${label}</text>`;
        // EZ measurement
        svg += dimLabel(tx - 4, ty + S/2 - ezH/2, tx - 4, ty + S/2 + ezH/2, '4"+4"', 'left');
    }

    // Room (Server Room, Launching Tower)
    (md.objectives || []).filter(o => o.type === 'room').forEach(o => {
        const cx = tx + S * o.x, cy = ty + S * o.y;
        const rw = S * 0.167, rh = S * 0.167; // 8" on 48"
        svg += `<rect x="${cx-rw/2}" y="${cy-rh/2}" width="${rw}" height="${rh}" fill="rgba(34,211,238,0.05)" stroke="#22d3ee" stroke-width="1.5" rx="3"/>`;
        const gw = rw * 0.25;
        svg += `<rect x="${cx-gw/2}" y="${cy-rh/2-2}" width="${gw}" height="4" fill="#22d3ee" rx="1"/>`;
        svg += `<rect x="${cx-gw/2}" y="${cy+rh/2-2}" width="${gw}" height="4" fill="#22d3ee" rx="1"/>`;
        svg += `<rect x="${cx-rw/2-2}" y="${cy-gw/2}" width="4" height="${gw}" fill="#22d3ee" rx="1"/>`;
        svg += `<rect x="${cx+rw/2-2}" y="${cy-gw/2}" width="4" height="${gw}" fill="#22d3ee" rx="1"/>`;
        if (o.labelPos === 'top') {
            svg += `<text x="${cx}" y="${cy-rh/2-6}" fill="#9ca3af" font-size="8" text-anchor="middle" font-weight="600">${o.label}</text>`;
        } else {
            svg += `<text x="${cx}" y="${cy+rh/2+13}" fill="#9ca3af" font-size="8" text-anchor="middle" font-weight="600">${o.label}</text>`;
        }
    });

    // Objective markers
    const colors = {
        antenna: '#22d3ee', console: '#34d399', beacon: '#f59e0b',
        objective: '#c084fc', techcoffin: '#fb923c', panoply: '#a78bfa',
        civilian: '#f472b6'
    };
    const shapes = {
        antenna: (cx,cy) => `<polygon points="${cx},${cy-9} ${cx+8},${cy+5} ${cx-8},${cy+5}" fill="${colors.antenna}" opacity="0.9"/>`,
        console: (cx,cy) => `<rect x="${cx-7}" y="${cy-7}" width="14" height="14" fill="${colors.console}" opacity="0.9" rx="2"/>`,
        beacon: (cx,cy) => `<circle cx="${cx}" cy="${cy}" r="7" fill="${colors.beacon}" opacity="0.9"/>`,
        objective: (cx,cy) => `<circle cx="${cx}" cy="${cy}" r="8" fill="${colors.objective}" opacity="0.9"/>`,
        techcoffin: (cx,cy) => `<rect x="${cx-8}" y="${cy-6}" width="16" height="12" fill="${colors.techcoffin}" opacity="0.9" rx="2"/>`,
        panoply: (cx,cy) => `<rect x="${cx-7}" y="${cy-7}" width="14" height="14" fill="${colors.panoply}" opacity="0.9" rx="7"/>`,
        civilian: (cx,cy) => `<circle cx="${cx}" cy="${cy}" r="6" fill="${colors.civilian}" opacity="0.9"/>`
    };

    // Objective distance annotations
    (md.objectives || []).filter(o => o.type !== 'room').forEach(o => {
        const cx = tx + S * o.x, cy = ty + S * o.y;
        if (shapes[o.type]) {
            svg += shapes[o.type](cx, cy);
            // Label positioning: default below, 'top' above
            if (o.labelPos === 'top') {
                svg += `<text x="${cx}" y="${cy-14}" fill="#9ca3af" font-size="8" text-anchor="middle" font-weight="500">${o.label}</text>`;
                if (o.edgeDist) {
                    svg += `<text x="${cx}" y="${cy-24}" fill="#6b7281" font-size="7" text-anchor="middle">${o.edgeDist}</text>`;
                }
            } else {
                svg += `<text x="${cx}" y="${cy+18}" fill="#9ca3af" font-size="8" text-anchor="middle" font-weight="500">${o.label}</text>`;
                if (o.edgeDist) {
                    svg += `<text x="${cx}" y="${cy+27}" fill="#6b7281" font-size="7" text-anchor="middle">${o.edgeDist}</text>`;
                }
            }
        }
    });

    // Legend
    const legendTypes = [...new Set((md.objectives||[]).filter(o=>o.type!=='room').map(o=>o.type))];
    if (legendTypes.length > 1) {
        const lx = tx + 6, ly = ty + S - 6 - legendTypes.length * 14;
        svg += `<rect x="${lx-3}" y="${ly-10}" width="110" height="${legendTypes.length*14+8}" fill="rgba(20,25,37,0.85)" rx="3" stroke="#2a3348" stroke-width="0.5"/>`;
        legendTypes.forEach((t, i) => {
            const y = ly + i * 14;
            if (shapes[t]) svg += shapes[t](lx + 6, y);
            const names = { antenna:'Antenna', console:'Console', beacon:'Beacon', objective:'Objective', techcoffin:'Tech-Coffin', panoply:'Panoply', civilian:'Civilian' };
            svg += `<text x="${lx+18}" y="${y+4}" fill="#9ca3af" font-size="7.5">${names[t]||t}</text>`;
        });
    }

    svg += '</svg>';
    return svg;
}

function renderDeployTable(dep) {
    let h = `<table class="dep-table"><thead><tr><th>Pts</th><th>SWC</th><th>Table</th><th>DZ</th></tr></thead><tbody>`;

function renderSharedRuleRef(id) {

function renderSkill(s) {
    let h = `<div class="skill-block"><div class="skill-name">${s.name}</div><div class="skill-type">${s.type}</div>`;
    if (s.requirements && s.requirements.length) {
        h += `<div class="skill-label">Requirements</div><ul>${s.requirements.map(r => `<li>${r}</li>`).join('')}</ul>`;

    }
    return h + '</div>';
}

function renderTacticalSupport(count) {

    let h = `<div class="mission-section"><div class="mission-section-head" onclick="toggleSection(this)"><h3>Tactical Support (${count} card${count>1?'s':''})</h3><span class="chevron">▼</span></div><div class="mission-section-body">`;

    h += '<div class="ts-grid">';

    h += `<div class="rules-section"><div class="rules-section-head" onclick="toggleSection(this)"><h2>Army Lists</h2><span class="chevron">▼</span></div><div class="rules-section-body">
        <ul>
            <li>Each player submits one or two Army Lists to CorvuSphere, both from a single Generic or Sectorial Army.</li>
            <li>Two printed copies of each Complete Army List (Open + Private info) — one for the Organizer before Round 1.</li>
            <li>Carry a printed Courtesy Army List (Open Information only) — shown to adversary after Deployment Phase.</li>
            <li>Players choose which list to use at the beginning of each Round, after learning opponent, Classifieds, faction, and table.</li>
        </ul>
    </div></div>`;

    h += `<div class="rules-section"><div class="rules-section-head" onclick="toggleSection(this)"><h2>Pairings & Byes</h2><span class="chevron">▼</span></div><div class="rules-section-body">
        <h3>Pairings</h3>
        <p>Round 1: random. From Round 2: Swiss system ranked by TP → OP → VP → opponent OP. First vs second, third vs fourth, etc.</p>
        <h3>Byes (Odd Number of Players)</h3>
        <p>Bye = Victory (4 TP), 0 OP, 0 VP. Round 1: random. Later rounds: lowest-ranked player who hasn't had a bye.</p>
        <p>After the last Round, players who had a bye recalculate: (Total OP × Rounds) ÷ Rounds Played, rounded up. Same for VP if still tied.</p>
    </div></div>`;

    h += `<div class="rules-section"><div class="rules-section-head" onclick="toggleSection(this)"><h2>Classified Objectives</h2><span class="chevron">▼</span></div><div class="rules-section-body">
        <p>Usually 1 OP each (varies by scenario). Each Classified provides its OP once per game.</p>
        <h3>Selection</h3>
        <p>Draw Classifieds after learning the mission and opponent's faction, before choosing an Army List. Shuffle your Classified Deck in front of opponent, draw two cards per Classified slot, discard one before drawing the next pair.</p>
        <h3>INTELCOM Card</h3>
        <p>Where specified: before the game (after choosing Classifieds), each player decides if a card is a Classified Objective or INTELCOM Card. Highest die roll announces first. Content is Private Information.</p>
        <h3>HVT Model</h3>
        <ul>
            <li>Deploy one HVT at the start of Deployment Phase, at least 4" outside any DZ, not on/inside scenery.</li>
            <li>HVTs are Neutral Civilians to both players.</li>
        </ul>
        <h3>Secure HVT</h3>
        <p>At end of game, can replace one Classified with Secure HVT. Accomplished when a non-Null Trooper is inside the enemy HVT's ZoC, while your own HVT's ZoC is free of enemy Troopers (not counting Null). Same OP as a normal Classified.</p>
    </div></div>`;

    h += `<div class="rules-section"><div class="rules-section-head" onclick="toggleSection(this)"><h2>Tactical Support</h2><span class="chevron">▼</span></div><div class="rules-section-body">
        <p>Each scenario specifies how many Tactical Support options. Drawn from the Tactical Objectives Deck after choosing your Army List. Remove all cards without a symbol first. Shuffle and draw in front of opponent. Open Information.</p>
        <p>Recipient must be a Model on the table (not Hidden Deployment, not Marker State). Irregular Troops and REM/VH are not eligible.</p>
        <h3>Effects Summary</h3>
        <ul>
            <li><strong>ReRoll:</strong> Apply (ReRoll) MOD to a Scenario Skill. Single use. After failing a Roll.</li>
            <li><strong>Auto-success:</strong> Automatic success on a Scenario Skill Roll. Single use. Before making a Roll.</li>
            <li><strong>Specialist ReRoll:</strong> Specialist Trooper gets (ReRoll) MOD on Scenario Skills for the game.</li>
            <li><strong>Wildcard:</strong> Pick any result from the chart.</li>
            <li><strong>Sensor:</strong> A Specialist Trooper gains Sensor Special Skill.</li>
            <li><strong>Specialist Operative:</strong> A Trooper gains Specialist Operative Special Skill.</li>
            <li><strong>MediKit:</strong> A Specialist Trooper gains a MediKit.</li>
            <li><strong>GizmoKit:</strong> A Specialist Trooper gains a GizmoKit.</li>
            <li><strong>Cancel:</strong> Cancel an Enemy Tactical Support option.</li>
            <li><strong>Blitzen:</strong> A Specialist Trooper gains a Blitzen.</li>
            <li><strong>Adhesive Launcher Rifle:</strong> A Specialist Trooper gains an Adhesive Launcher Rifle.</li>
            <li><strong>WIP+1 Lieutenant:</strong> Lieutenant gets WIP +1 for the Initiative Roll.</li>
        </ul>
    </div></div>`;

    h += `<div class="rules-section"><div class="rules-section-head" onclick="toggleSection(this)"><h2>Extras</h2><span class="chevron">▼</span></div><div class="rules-section-body">
        <p>Organizer may choose one or more. Must be announced when the event is first announced.</p>
        <ul>
            <li><strong>Escalation:</strong> 3 Rounds only. Round 1: 200/150-Tier, Round 2: 300/250-Tier, Round 3: 400/350-Tier. Three Army Lists needed.</li>
            <li><strong>Free Game:</strong> Removes the 15-Trooper limit.</li>
            <li><strong>Spec-Ops:</strong> Field a Spec-Ops with 12 Experience Points. Has Specialist Operative. No further XP earned during tournament.</li>
            <li><strong>Soldiers of Fortune:</strong> Include up to 85pts of Mercenary Troops (costs 1 SWC). Respect Availability on Unit Profile, ignore Army/Sectorial limits. No duplicate Characters.</li>
            <li><strong>Direct Action:</strong> 4 scenarios without Classified Deck or HVTs.</li>
            <li><strong>Reinforcements:</strong> Reinforcement Rules used. All players must use Reinforcements.</li>
            <li><strong>Resilience Operations:</strong> Uses Tactical Objectives Deck + Battle Conditions Deck instead of ITS scenarios/Classified Deck.</li>
        </ul>
    </div></div>`;

    h += `<div class="rules-section"><div class="rules-section-head" onclick="toggleSection(this)"><h2>Token Diameters</h2><span class="chevron">▼</span></div><div class="rules-section-body">
        <table class="rules-table"><thead><tr><th>Token</th><th>Diameter</th></tr></thead><tbody>
        <tr><td>Trans. Antenna / Tech-Coffin / Console / Objective</td><td>40mm</td></tr>
        <tr><td>Supply Box / Beacon / Player A/B / Data Pack / Defensive Turret / CivEvac</td><td>25mm</td></tr>
        </tbody></table>
    </div></div>`;

    return h;
}

function renderReference() {
    let h = '<p class="text-note" style="margin-bottom:12px">Shared rules that appear across multiple missions. These are also available inline within each mission card.</p>';
    Object.keys(SHARED_RULES).forEach(id => {
        const sr = SHARED_RULES[id];
        h += `<div class="rules-section"><div class="rules-section-head" onclick="toggleSection(this)"><h2>${sr.title}</h2><span class="chevron">▼</span></div><div class="rules-section-body">${sr.html}</div></div>`;
    });
    return h;
}


// ═══════════════════════════════════════════
// NAVIGATION & STATE
// ═══════════════════════════════════════════

const content = document.getElementById('content');
const navBtns = document.querySelectorAll('.nav-btn');

function randomMission(category) {
    const pool = MISSIONS.filter(m => m.category === category);
    const pick = pool[Math.floor(Math.random() * pool.length)];
    navigate('mission/' + pick.id);
}

function navigate(route) {
    window.location.hash = route;
}

function renderRoute() {
    const hash = (window.location.hash || '#missions').slice(1);
    const parts = hash.split('/');

    // Update nav buttons
    navBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.view === parts[0] || (parts[0] === 'mission' && b.dataset.view === 'missions'));
    });

    if (parts[0] === 'missions' || parts[0] === '') {
        content.innerHTML = renderMissionGrid();
    } else if (parts[0] === 'mission' && parts[1]) {
        const m = MISSIONS.find(m => m.id === parts[1]);
        if (m) {
            content.innerHTML = renderMissionDetail(m);
            window.scrollTo({ top: 0 });
        } else {
            content.innerHTML = '<p>Mission not found.</p>';
        }
    } else if (parts[0] === 'season') {
        content.innerHTML = renderSeasonRules();
    } else if (parts[0] === 'tournament') {
        content.innerHTML = renderTournamentRules();
    } else if (parts[0] === 'reference') {
        content.innerHTML = renderReference();
    } else {
        content.innerHTML = renderMissionGrid();
    }
}

// Nav button clicks
navBtns.forEach(b => {
    b.addEventListener('click', () => navigate(b.dataset.view));
});

// Hash change
window.addEventListener('hashchange', renderRoute);

// Initial render
renderRoute();

// Section toggle
function toggleSection(el) {
    el.parentElement.classList.toggle('open');
}
window.toggleSection = toggleSection;

// Shared rule inline toggle
function toggleSharedRule(el) {
    el.classList.toggle('open');
    const next = el.nextElementSibling;
    if (next) next.classList.toggle('open');
}
window.toggleSharedRule = toggleSharedRule;

function lookupChart(chart, roll) {
    return chart.find(e => roll >= e.min && roll <= e.max).result;
}

const DICE_TABLES = {
    ts:   { name: 'Tactical Support', die: 12, roll: v => TACTICAL_SUPPORT_CHART[v-1].effect },

};

function toggleDicePanel() {
    document.getElementById('dicePanel').classList.toggle('open');
}

function diceRoll(type) {
    const t = DICE_TABLES[type];
    const value = Math.floor(Math.random() * t.die) + 1;
    const result = t.roll(value);
    const log = document.getElementById('diceLog');
    const entry = document.createElement('div');
    entry.className = 'dice-entry';
    entry.innerHTML = `<div class="dice-entry-text"><span class="dice-entry-type">${t.name}</span> d${t.die}: <span class="dice-entry-roll">${value}</span> → <span class="dice-entry-result">${result}</span></div><button class="dice-entry-del" onclick="this.parentElement.remove()" title="Remove">✕</button>`;
    log.insertBefore(entry, log.firstChild);
}
window.diceRoll = diceRoll;

function diceClearLog() {
    document.getElementById('diceLog').innerHTML = '';
}
window.diceClearLog = diceClearLog;

        const panel = document.getElementById('dicePanel');
        if (panel.classList.contains('open')) panel.classList.remove('open');
